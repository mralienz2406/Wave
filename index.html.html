<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAVE — Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0d0c;
    --surface: #1a1916;
    --surface2: #22211f;
    --border: rgba(255,255,255,0.07);
    --accent: #e8a44a;
    --accent-dim: rgba(232,164,74,0.15);
    --text: #f0ece4;
    --muted: #6b6760;
    --muted2: #3a3834;
    --danger: #c0392b;
    --radius: 12px;
    --player-h: 110px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* TOP BAR */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    color: var(--accent);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .queue-count {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  /* MAIN AREA */
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* SIDEBAR: NOW PLAYING */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 20px;
    background: var(--surface);
  }

  .artwork {
    width: 100%;
    aspect-ratio: 1;
    border-radius: var(--radius);
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .artwork svg { opacity: 0.2; }
  .artwork.playing { border-color: rgba(232,164,74,0.3); }
  .artwork-bars {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    align-items: flex-end;
    height: 28px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .artwork.playing .artwork-bars { opacity: 1; }
  .bar {
    width: 4px;
    border-radius: 2px;
    background: var(--accent);
    animation: none;
    height: 4px;
  }
  @keyframes bounce1 { 0%,100%{height:4px} 50%{height:22px} }
  @keyframes bounce2 { 0%,100%{height:10px} 50%{height:4px} }
  @keyframes bounce3 { 0%,100%{height:16px} 50%{height:28px} }
  @keyframes bounce4 { 0%,100%{height:6px} 50%{height:18px} }
  @keyframes bounce5 { 0%,100%{height:20px} 50%{height:8px} }
  .playing .bar:nth-child(1) { animation: bounce1 0.9s ease-in-out infinite; }
  .playing .bar:nth-child(2) { animation: bounce2 0.7s ease-in-out infinite 0.1s; }
  .playing .bar:nth-child(3) { animation: bounce3 1.1s ease-in-out infinite 0.2s; }
  .playing .bar:nth-child(4) { animation: bounce4 0.8s ease-in-out infinite 0.15s; }
  .playing .bar:nth-child(5) { animation: bounce5 1.0s ease-in-out infinite 0.05s; }

  .now-playing-info { display: flex; flex-direction: column; gap: 4px; }
  .song-title {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .song-artist {
    font-size: 13px;
    color: var(--muted);
  }

  /* VOLUME */
  .vol-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .vol-row svg { flex-shrink: 0; color: var(--muted); }
  .vol-slider {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    border-radius: 2px;
    background: var(--muted2);
    outline: none;
    cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* PLAYLIST */
  .playlist-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .playlist-header {
    padding: 16px 24px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .playlist-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .playlist-actions { display: flex; gap: 8px; }

  .icon-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .icon-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  .playlist-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
  }
  .playlist-list::-webkit-scrollbar { width: 4px; }
  .playlist-list::-webkit-scrollbar-track { background: transparent; }
  .playlist-list::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 14px;
    color: var(--muted);
  }
  .empty-state svg { opacity: 0.3; }
  .empty-state p { font-size: 14px; text-align: center; line-height: 1.6; }
  .upload-hint {
    background: var(--accent-dim);
    border: 1px dashed rgba(232,164,74,0.4);
    border-radius: 10px;
    padding: 12px 20px;
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    transition: all 0.15s;
  }
  .upload-hint:hover { background: rgba(232,164,74,0.25); }

  .track-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.12s;
    border: 1px solid transparent;
  }
  .track-item:hover { background: var(--surface2); }
  .track-item.active {
    background: var(--accent-dim);
    border-color: rgba(232,164,74,0.2);
  }
  .track-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    width: 20px;
    text-align: right;
    flex-shrink: 0;
  }
  .track-item.active .track-num { color: var(--accent); }
  .track-info { flex: 1; overflow: hidden; }
  .track-name {
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-item.active .track-name { color: var(--accent); font-weight: 500; }
  .track-artist { font-size: 12px; color: var(--muted); }
  .track-dur {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .track-remove {
    background: none; border: none; color: var(--muted2);
    cursor: pointer; padding: 4px; display: none;
    border-radius: 4px; line-height: 0;
  }
  .track-item:hover .track-remove { display: block; }
  .track-remove:hover { color: var(--danger); }

  .drag-handle {
    color: var(--muted2);
    cursor: grab;
    padding: 4px 2px;
    display: none;
    align-items: center;
    line-height: 0;
    flex-shrink: 0;
    touch-action: none;
  }
  .track-item:hover .drag-handle { display: flex; }
  .drag-handle:active { cursor: grabbing; }
  .track-item.dragging {
    opacity: 0.35;
    background: var(--surface2);
  }
  .track-item.drag-over-top { border-top: 2px solid var(--accent); }
  .track-item.drag-over-bottom { border-bottom: 2px solid var(--accent); }

  /* PLAYER BAR */
  .player-bar {
    height: var(--player-h);
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 14px 28px 16px;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }

  /* PROGRESS */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 36px;
  }
  .time.end { text-align: right; }
  .progress-bar {
    flex: 1;
    height: 3px;
    background: var(--muted2);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }
  .progress-fill {
    height: 100%;
    border-radius: 2px;
    background: var(--accent);
    width: 0%;
    pointer-events: none;
    transition: width 0.1s linear;
  }
  .progress-bar:hover .progress-fill { background: #f0b760; }
  .progress-thumb {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
  }
  .progress-bar:hover .progress-thumb { opacity: 1; }

  /* CONTROLS */
  .controls-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .ctrl-btn {
    background: none; border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 6px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 0;
  }
  .ctrl-btn:hover { color: var(--text); }
  .ctrl-btn.active { color: var(--accent); }
  .play-btn {
    background: var(--accent);
    color: var(--bg);
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    line-height: 0;
  }
  .play-btn:hover { background: #f0b760; transform: scale(1.05); }
  .play-btn:active { transform: scale(0.97); }

  /* FILE INPUT */
  #file-input { display: none; }

  /* DRAG OVERLAY */
  .drop-overlay {
    position: fixed; inset: 0;
    background: rgba(232,164,74,0.08);
    border: 2px dashed rgba(232,164,74,0.5);
    border-radius: 0;
    display: none;
    z-index: 100;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-family: 'DM Serif Display', serif;
    color: var(--accent);
    pointer-events: none;
  }
  .drop-overlay.active { display: flex; }

  @media (max-width: 600px) {
    .sidebar { width: 100%; display: none; }
    main { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="drop-overlay" id="dropOverlay">Drop your music here</div>
<input type="file" id="file-input" accept="audio/*" multiple>

<header>
  <div class="logo">WAVE</div>
  <div class="header-right">
    <span class="queue-count" id="queueCount">0 tracks</span>
    <button class="icon-btn" title="Add music" onclick="document.getElementById('file-input').click()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="icon-btn" id="clearBtn" title="Clear playlist">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/></svg>
    </button>
  </div>
</header>

<main>
  <aside class="sidebar">
    <div class="artwork" id="artworkBox">
      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="9" x2="12" y2="3"/><line x1="12" y1="15" x2="12" y2="21"/>
      </svg>
      <div class="artwork-bars" id="artworkBars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>
    <div class="now-playing-info">
      <div class="song-title" id="npTitle">Nothing playing</div>
      <div class="song-artist" id="npArtist">Add songs to get started</div>
    </div>
    <div class="vol-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.01" value="1">
    </div>
  </aside>

  <section class="playlist-section">
    <div class="playlist-header">
      <span class="playlist-label">Playlist</span>
      <div class="playlist-actions">
        <button class="icon-btn" id="shuffleBtn" title="Shuffle">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
        </button>
        <button class="icon-btn" id="repeatBtn" title="Repeat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
    </div>
    <div class="playlist-list" id="playlistList">
      <div class="empty-state" id="emptyState">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        <p>Your playlist is empty.<br>Add some songs to start.</p>
        <div class="upload-hint" onclick="document.getElementById('file-input').click()">+ Add Music Files</div>
      </div>
    </div>
  </section>
</main>

<div class="player-bar">
  <div class="progress-row">
    <span class="time" id="currentTime">0:00</span>
    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
      <div class="progress-thumb" id="progressThumb"></div>
    </div>
    <span class="time end" id="totalTime">0:00</span>
  </div>
  <div class="controls-row">
    <button class="ctrl-btn" id="shuffleBtn2" title="Shuffle">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
    </button>
    <button class="ctrl-btn" id="prevBtn" title="Previous">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
    </button>
    <button class="play-btn" id="playBtn" title="Play / Pause">
      <svg id="playIcon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" title="Next">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg>
    </button>
    <button class="ctrl-btn active" id="repeatBtn2" title="Repeat">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    </button>
  </div>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById('audio');
const fileInput = document.getElementById('file-input');
const playlistList = document.getElementById('playlistList');
const emptyState = document.getElementById('emptyState');
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const progressThumb = document.getElementById('progressThumb');
const progressBar = document.getElementById('progressBar');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');
const npTitle = document.getElementById('npTitle');
const npArtist = document.getElementById('npArtist');
const volSlider = document.getElementById('volSlider');
const queueCount = document.getElementById('queueCount');
const artworkBox = document.getElementById('artworkBox');
const artworkBars = document.getElementById('artworkBars');
const shuffleBtn = document.getElementById('shuffleBtn');
const shuffleBtn2 = document.getElementById('shuffleBtn2');
const repeatBtn = document.getElementById('repeatBtn');
const repeatBtn2 = document.getElementById('repeatBtn2');
const clearBtn = document.getElementById('clearBtn');
const dropOverlay = document.getElementById('dropOverlay');

let tracks = [];
let currentIndex = -1;
let isPlaying = false;
let shuffle = false;
let repeat = true;
let shuffleOrder = [];
let db = null;

const PLAY_SVG = `<polygon points="5 3 19 12 5 21 5 3"/>`;
const PAUSE_SVG = `<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>`;

/* ── IndexedDB ── */
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('wave-player', 1);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (!d.objectStoreNames.contains('tracks')) {
        d.createObjectStore('tracks', { keyPath: 'id' });
      }
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}

function dbSaveTrack(track) {
  if (!db) return;
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').put({
    id: track.id, name: track.name, artist: track.artist,
    duration: track.duration, order: track.order, blob: track.blob
  });
}

function dbDeleteTrack(id) {
  if (!db) return;
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').delete(id);
}

function dbSaveAllOrders() {
  if (!db) return;
  const tx = db.transaction('tracks', 'readwrite');
  const store = tx.objectStore('tracks');
  tracks.forEach((t, i) => { t.order = i; store.put({ id: t.id, name: t.name, artist: t.artist, duration: t.duration, order: i, blob: t.blob }); });
}

function dbClearAll() {
  if (!db) return;
  const tx = db.transaction('tracks', 'readwrite');
  tx.objectStore('tracks').clear();
}

function dbLoadAll() {
  return new Promise((res) => {
    if (!db) return res([]);
    const tx = db.transaction('tracks', 'readonly');
    const req = tx.objectStore('tracks').getAll();
    req.onsuccess = e => res(e.target.result || []);
    req.onerror = () => res([]);
  });
}

/* ── Helpers ── */
function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function stripExt(name) { return name.replace(/\.[^/.]+$/, ''); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

/* ── Render ── */
function renderPlaylist() {
  playlistList.querySelectorAll('.track-item').forEach(i => i.remove());
  emptyState.style.display = tracks.length ? 'none' : 'flex';
  queueCount.textContent = `${tracks.length} track${tracks.length !== 1 ? 's' : ''}`;
  tracks.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'track-item' + (i === currentIndex ? ' active' : '');
    el.dataset.index = i;
    el.innerHTML = `
      <span class="track-num">${i + 1}</span>
      <div class="track-info">
        <div class="track-name">${t.name}</div>
        <div class="track-artist">${t.artist}</div>
      </div>
      <span class="track-dur">${t.duration || '—'}</span>
      <button class="track-remove" data-index="${i}" title="Remove">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    `;
    el.addEventListener('click', (e) => {
      if (e.target.closest('.track-remove')) {
        removeTrack(parseInt(e.target.closest('.track-remove').dataset.index));
        return;
      }
      loadTrack(i, true);
    });
    setupHover(el, i);
    playlistList.appendChild(el);
  });
}

/* ── Discord Bridge ── */
const BRIDGE = 'http://127.0.0.1:35199';
let discordEnabled = true;

function discordUpdate(playing) {
  if (!discordEnabled || currentIndex < 0 || !tracks[currentIndex]) return;
  const t = tracks[currentIndex];
  fetch(`${BRIDGE}/now-playing`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      title: t.name,
      artist: t.artist,
      playing,
      startTime: playing ? Date.now() : null
    })
  }).catch(() => { discordEnabled = false; }); // silently disable if bridge not running
}

function discordClear() {
  if (!discordEnabled) return;
  fetch(`${BRIDGE}/clear`, { method: 'POST' }).catch(() => {});
}

/* ── Playback ── */
function loadTrack(index, play = false) {
  if (!tracks.length) return;
  currentIndex = index;
  const t = tracks[index];
  audio.src = t.url;
  npTitle.textContent = t.name;
  npArtist.textContent = t.artist;
  if (play) { audio.play(); setPlaying(true); discordUpdate(true); }
  renderPlaylist();
  const active = playlistList.querySelector('.track-item.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

function setPlaying(val) {
  isPlaying = val;
  playIcon.innerHTML = val ? PAUSE_SVG : PLAY_SVG;
  artworkBox.classList.toggle('playing', val);
  artworkBars.classList.toggle('playing', val);
  discordUpdate(val);
}

function nextTrack() {
  if (!tracks.length) return;
  if (shuffle) { loadTrack(shuffleOrder.find(i => i !== currentIndex) ?? shuffleOrder[0], true); }
  else { loadTrack(repeat ? (currentIndex + 1) % tracks.length : Math.min(currentIndex + 1, tracks.length - 1), true); }
}

function prevTrack() {
  if (!tracks.length) return;
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  loadTrack(repeat ? (currentIndex - 1 + tracks.length) % tracks.length : Math.max(currentIndex - 1, 0), true);
}

/* ── Remove ── */
function removeTrack(i) {
  const id = tracks[i].id;
  URL.revokeObjectURL(tracks[i].url);
  tracks.splice(i, 1);
  dbDeleteTrack(id);
  dbSaveAllOrders();
  if (i === currentIndex) {
    if (tracks.length) { loadTrack(Math.min(i, tracks.length - 1), isPlaying); }
    else { currentIndex = -1; audio.src = ''; setPlaying(false); npTitle.textContent = 'Nothing playing'; npArtist.textContent = 'Add songs to get started'; }
  } else if (i < currentIndex) { currentIndex--; }
  renderPlaylist();
}

/* ── Add files ── */
function addFiles(files) {
  const promises = [];
  for (const f of files) {
    if (!f.type.startsWith('audio/')) continue;
    const blob = f;
    const url = URL.createObjectURL(blob);
    const name = stripExt(f.name);
    const track = { id: uid(), url, name, artist: 'Unknown Artist', duration: null, blob, order: tracks.length };
    const p = new Promise(res => {
      const tmp = new Audio(url);
      tmp.addEventListener('loadedmetadata', () => { track.duration = fmt(tmp.duration); res(); });
      tmp.addEventListener('error', res);
      setTimeout(res, 3000);
    });
    promises.push(p.then(() => { tracks.push(track); dbSaveTrack(track); }));
  }
  Promise.all(promises).then(() => {
    if (currentIndex === -1 && tracks.length) loadTrack(0, false);
    renderPlaylist();
  });
}

/* ── Controls ── */
playBtn.addEventListener('click', () => {
  if (!tracks.length) { fileInput.click(); return; }
  if (currentIndex === -1) { loadTrack(0, true); return; }
  if (isPlaying) { audio.pause(); setPlaying(false); }
  else { audio.play(); setPlaying(true); }
});
prevBtn.addEventListener('click', prevTrack);
nextBtn.addEventListener('click', nextTrack);
audio.addEventListener('ended', () => { if (tracks.length === 1 && repeat) { audio.currentTime = 0; audio.play(); return; } nextTrack(); });
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  progressFill.style.width = pct + '%';
  progressThumb.style.left = pct + '%';
  currentTimeEl.textContent = fmt(audio.currentTime);
  totalTimeEl.textContent = fmt(audio.duration);
});
progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  if (audio.duration) audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});
volSlider.addEventListener('input', () => { audio.volume = volSlider.value; });

function toggleShuffle() {
  shuffle = !shuffle;
  [shuffleBtn, shuffleBtn2].forEach(b => b.classList.toggle('active', shuffle));
  if (shuffle) shuffleOrder = tracks.map((_, i) => i).sort(() => Math.random() - 0.5);
}
shuffleBtn.addEventListener('click', toggleShuffle);
shuffleBtn2.addEventListener('click', toggleShuffle);

function toggleRepeat() {
  repeat = !repeat;
  [repeatBtn, repeatBtn2].forEach(b => b.classList.toggle('active', repeat));
}
repeatBtn.addEventListener('click', toggleRepeat);
repeatBtn2.addEventListener('click', toggleRepeat);

clearBtn.addEventListener('click', () => {
  if (!tracks.length) return;
  if (!confirm('Clear the entire playlist?')) return;
  tracks.forEach(t => URL.revokeObjectURL(t.url));
  tracks = []; currentIndex = -1;
  dbClearAll();
  audio.src = ''; setPlaying(false); discordClear();
  npTitle.textContent = 'Nothing playing';
  npArtist.textContent = 'Add songs to get started';
  renderPlaylist();
});

fileInput.addEventListener('change', (e) => addFiles(e.target.files));
document.addEventListener('dragover', (e) => { e.preventDefault(); dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', (e) => { if (!e.relatedTarget) dropOverlay.classList.remove('active'); });
document.addEventListener('drop', (e) => { e.preventDefault(); dropOverlay.classList.remove('active'); addFiles(e.dataTransfer.files); });

/* ── Hover + number key reorder ── */
let hoveredTrackIndex = null;

function setupHover(el, index) {
  el.addEventListener('mouseenter', () => { hoveredTrackIndex = index; });
  el.addEventListener('mouseleave', () => { hoveredTrackIndex = null; });
}

document.addEventListener('keydown', (e) => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); playBtn.click(); return; }
  if (e.code === 'ArrowRight') { nextTrack(); return; }
  if (e.code === 'ArrowLeft') { prevTrack(); return; }
  if (hoveredTrackIndex !== null && tracks.length > 1) {
    const numMap = {'Digit1':0,'Digit2':1,'Digit3':2,'Digit4':3,'Digit5':4,'Digit6':5,'Digit7':6,'Digit8':7,'Digit9':8,'Digit0':9};
    if (e.code in numMap) {
      e.preventDefault();
      const dest = Math.min(numMap[e.code], tracks.length - 1);
      const from = hoveredTrackIndex;
      if (from === dest) return;
      const moved = tracks.splice(from, 1)[0];
      tracks.splice(dest, 0, moved);
      if (currentIndex === from) currentIndex = dest;
      else if (from < currentIndex && dest >= currentIndex) currentIndex--;
      else if (from > currentIndex && dest <= currentIndex) currentIndex++;
      hoveredTrackIndex = dest;
      dbSaveAllOrders();
      renderPlaylist();
      const el = playlistList.querySelectorAll('.track-item')[dest];
      if (el) { el.style.background = 'rgba(232,164,74,0.3)'; setTimeout(() => { el.style.background = ''; }, 400); el.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
    }
  }
});

/* ── Boot: load from IndexedDB ── */
openDB().then(d => {
  db = d;
  return dbLoadAll();
}).then(saved => {
  if (!saved.length) { renderPlaylist(); return; }
  saved.sort((a, b) => a.order - b.order);
  const promises = saved.map(s => new Promise(res => {
    const url = URL.createObjectURL(s.blob);
    tracks.push({ id: s.id, url, name: s.name, artist: s.artist, duration: s.duration, blob: s.blob, order: s.order });
    res();
  }));
  Promise.all(promises).then(() => renderPlaylist());
}).catch(() => renderPlaylist());
</script>
